name: Backend Build & Deploy
$schema: "https://json.schemastore.org/github-workflow.json"

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/darija-backend:latest

  deploy-render:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_SERVICE_ID != '' && secrets.RENDER_API_KEY != '' }}
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys

  deploy-railway:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_API_KEY != '' }}
    steps:
      - name: Install Railway CLI
        run: curl -sSL https://railway.app/install.sh | sh
      - name: Deploy to Railway (requires project linked)
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway up --service darija-backend --detach || echo "Railway deploy requires project setup"
